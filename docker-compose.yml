services:
  mongo:
    image: mongo:7
    container_name: franchise-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: franchise_db
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    container_name: franchise-api
    restart: always
    depends_on:
      - mongo
    ports:
      - "8080:8080"

volumes:
  mongo_data: